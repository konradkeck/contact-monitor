services:
  app:
    build: .
    container_name: contact-monitor_app
    working_dir: /app
    volumes:
      - ./:/app
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "8090:8000"
    environment:
      PHP_CLI_SERVER_WORKERS: 8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: contact-monitor_db
    environment:
      POSTGRES_DB: contact-monitor
      POSTGRES_USER: contact-monitor
      POSTGRES_PASSWORD: contact-monitor
    volumes:
      - contact-monitor_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

volumes:
  contact-monitor_pgdata:
